kind = "web"
previewPath = "/"
title = "نور البقرة"
version = "1.0.0"
id = "artifacts/noor-albaqara"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21327
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/noor-albaqara run dev"

[services.env]
PORT = "21327"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/noor-albaqara", "run", "build"]
publicDir = "artifacts/noor-albaqara/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
