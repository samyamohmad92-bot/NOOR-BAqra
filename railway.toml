[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @workspace/noor-albaqara run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.cjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[[services]]
name = "noor-albaqara"
